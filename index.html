<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amazon Clone</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<header class="navbar">

<div class="logo">

<img src="images/logo.png" alt="Amazon Logo">

</div>

<div class="search">

<input type="text" placeholder="Search Amazon">

<button>Search</button>

</div>

<div class="menu">

<a href="#">Account</a>

<a href="#">Orders</a>

<a href="#">Cart</a>

</div>

</header>


<!-- Hero Section -->

<section class="hero">

<h1>Welcome to Amazon</h1>

<p>Best Deals Every Day</p>

</section>


<!-- Products -->

<section class="products">

<div class="product">

<img src="images/product1.png" width="200">

<h3>Headphones</h3>

<p>$25</p>

<button>Add to Cart</button>

</div>


<div class="product">

<img src="images/product2.png" width="200">

<h3>Shoes</h3>

<p>$40</p>

<button>Add to Cart</button>

</div>

</section>


</body>

</html>
